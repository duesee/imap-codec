[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    # Used in benchmarking
    "https://github.com/stalwartlabs/mail-server?rev=53f0222f308b3e844c158fc0e603d10361da3c63",
    # Used for `pythonize` until PyO3 0.22 release is available
    "https://github.com/HenningHolmDE/pythonize/?branch=update_to_pyo3_0.22",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
]

[licenses.private]
ignore = true
